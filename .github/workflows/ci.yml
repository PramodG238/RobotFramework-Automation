name: QA Smoke Test
 
on:
  push:
    branches: [main]
 
jobs:
  test:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
 
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
 
      - name: Install pytest
        run: pip install pytest
 
      - name: Run smoke test
        run: |
          echo "QA pipeline is running!"
          python -m pytest --version
