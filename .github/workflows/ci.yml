name: QA Automation Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

jobs:
  robot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        uses: browser-actions/setup-chrome@latest

      # ✅ Install Java (required for Allure)
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Install Allure (fixed method)
      - name: Install Allure
        run: |
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/latest/download/allure-2.29.0.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # ✅ Run tests
      - name: Run Robot Framework tests
        run: |
          python -m robot \
          --variable BROWSER:headlesschrome \
          --listener allure_robotframework \
          --outputdir results tests/

      # ✅ Generate Allure report
      - name: Generate Allure Report
        run: |
          allure generate results --clean -o allure-report

      # ✅ Upload report
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      # Optional: raw results
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: robot-results
          path: results/
